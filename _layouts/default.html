<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
        :root {
            --bg: #eef5f7;
            --surface: #ffffff;
            --surface-muted: #f5f8fa;
            --text: #1f2a33;
            --muted: #5e6b75;
            --line: #d9e3e8;
            --accent: #0f6b78;
            --accent-dark: #0a4f5a;
            --accent-soft: #d9eef2;
            --warning: #a15c00;
            --shadow: 0 14px 34px rgba(22, 48, 58, 0.14);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 980px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .site-header {
            background: #12323a;
            color: white;
            padding: 22px 28px;
        }

        .site-header a {
            color: white;
            border-bottom-color: rgba(255, 255, 255, 0.5);
        }

        .site-title {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0;
        }

        .site-subtitle {
            color: #d7e8ec;
            margin-top: 4px;
            font-size: 0.95rem;
        }

        .top-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        .top-nav a {
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.34);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.08);
        }

        .top-nav a:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        .crumb-nav {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
            color: #d7e8ec;
            font-weight: 600;
        }

        .crumb-nav a {
            color: white;
            text-decoration: none;
            border-bottom: none;
            opacity: 0.88;
        }

        .crumb-nav a:hover,
        .crumb-nav a.is-active {
            opacity: 1;
        }

        .crumb-sep {
            opacity: 0.65;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .section-nav a {
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.34);
            border-radius: 999px;
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.08);
        }

        .section-nav a:hover,
        .section-nav a.is-active {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.46);
        }

        main {
            padding: 32px;
        }
        
        h1 {
            color: var(--text);
            margin-bottom: 12px;
            font-size: 2.2rem;
            line-height: 1.15;
        }
        
        h2 {
            color: var(--accent-dark);
            margin-top: 32px;
            margin-bottom: 14px;
            font-size: 1.45rem;
            line-height: 1.25;
        }

        h3 {
            color: var(--text);
            margin-top: 24px;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        .trip-info {
            font-size: 1.05rem;
            color: var(--muted);
            margin-bottom: 30px;
            font-weight: 500;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
        }
        
        hr {
            border: none;
            border-top: 1px solid var(--line);
            margin: 30px 0;
        }
        
        p {
            margin-bottom: 14px;
        }

        ul {
            margin: 0 0 18px 22px;
        }
        
        li {
            margin-bottom: 10px;
            color: var(--text);
        }
        
        strong {
            color: var(--text);
        }
        
        a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--accent);
        }
        
        a:hover {
            color: var(--accent-dark);
        }

        .back-link {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--line);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0 24px;
            overflow-x: auto;
            display: block;
        }

        th,
        td {
            border: 1px solid var(--line);
            padding: 10px 12px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: var(--surface-muted);
            color: var(--accent-dark);
        }

        blockquote {
            margin: 18px 0;
            padding: 14px 16px;
            border-left: 4px solid var(--warning);
            background: #fff7ea;
            color: #4d3a21;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin: 18px 0 24px;
        }

        .quick-card {
            border: 1px solid #a7d2bf;
            border-radius: 20px;
            background:
                linear-gradient(180deg, rgba(237, 251, 243, 0.99), rgba(196, 231, 212, 0.96)),
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 42%),
                linear-gradient(135deg, rgba(15, 107, 120, 0.08), rgba(28, 139, 116, 0.22));
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.95),
                0 18px 36px rgba(22, 48, 58, 0.14),
                0 10px 22px rgba(28, 139, 116, 0.22);
            overflow: hidden;
            transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
            position: relative;
        }

        .quick-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.95),
                0 26px 44px rgba(22, 48, 58, 0.18),
                0 14px 26px rgba(28, 139, 116, 0.28);
            border-color: #82c4a7;
        }

        .quick-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.54), transparent 38%, rgba(28, 139, 116, 0.14)),
                radial-gradient(circle at top right, rgba(255, 255, 255, 0.32), transparent 30%);
            pointer-events: none;
        }

        .quick-card:active {
            transform: translateY(-1px) scale(0.995);
        }

        .card-link {
            display: block;
            height: 100%;
            padding: 20px;
            color: inherit;
            text-decoration: none;
            border-bottom: none;
            position: relative;
            z-index: 1;
        }

        .card-link:hover {
            color: inherit;
        }

        .quick-card h3 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.18rem;
        }

        .quick-card p:last-child {
            margin-bottom: 0;
        }

        .quick-card p.badge-row {
            margin-bottom: 12px;
        }

        .badge {
            display: inline-block;
            margin: 0 8px 8px 0;
            padding: 5px 9px;
            border-radius: 8px;
            background: var(--accent-soft);
            color: var(--accent-dark);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .hero-panel {
            margin: 18px 0 24px;
            padding: 22px;
            border-radius: 16px;
            background:
                radial-gradient(circle at top right, rgba(255, 255, 255, 0.55), transparent 34%),
                linear-gradient(135deg, #0f6b78, #1c8b74 58%, #b0d8c6);
            color: white;
            box-shadow: var(--shadow);
        }

        .hero-panel p:last-child {
            margin-bottom: 0;
        }

        .hero-title {
            font-size: 1.05rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.92;
            margin-bottom: 8px;
        }

        .hero-panel h2 {
            color: white;
            margin: 0 0 10px;
            font-size: 1.8rem;
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        .hero-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.24);
            font-weight: 600;
        }

        .anchor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin: 18px 0 24px;
        }

        .anchor-card {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
            background: linear-gradient(180deg, #ffffff, #f7fafb);
        }

        .anchor-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--accent-dark);
        }

        .icon-thumb {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: var(--accent-soft);
            font-size: 1.15rem;
            flex-shrink: 0;
        }

        .anchor-card p,
        .anchor-card small {
            margin: 0;
            color: var(--muted);
        }

        .day-card {
            margin: 26px 0;
            padding: 22px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: linear-gradient(180deg, #ffffff, #fbfdfe);
            box-shadow: 0 8px 24px rgba(22, 48, 58, 0.08);
        }

        .day-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 14px;
        }

        .day-header h3 {
            margin: 0 0 6px;
            font-size: 1.2rem;
        }

        .day-subtitle {
            color: var(--muted);
            margin: 0;
        }

        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 14px 0 6px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 11px;
            border-radius: 999px;
            background: var(--surface-muted);
            border: 1px solid var(--line);
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .timeline-table {
            margin-top: 16px;
        }

        .timeline-table th:first-child,
        .timeline-table td:first-child {
            width: 150px;
            white-space: nowrap;
            font-weight: 700;
            color: var(--accent-dark);
        }

        input[type="checkbox"] {
            cursor: pointer;
            margin-right: 8px;
            accent-color: var(--accent);
        }

        li.task-complete {
            text-decoration: line-through;
            color: #7f8c95;
        }

        label {
            cursor: pointer;
        }

        @media (max-width: 620px) {
            body {
                padding: 0;
            }

            .container {
                border-radius: 0;
                min-height: 100vh;
            }

            .site-header,
            main {
                padding: 22px 18px;
            }

            main {
                padding-bottom: 28px;
            }

            h1 {
                font-size: 1.75rem;
            }

            h2 {
                font-size: 1.3rem;
            }

            .top-nav a {
                flex: 1 1 auto;
                justify-content: center;
            }

            .crumb-nav {
                gap: 6px;
                font-size: 0.95rem;
                margin-top: 10px;
            }

            .section-nav {
                display: none;
            }

            .quick-grid,
            .anchor-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .quick-card,
            .anchor-card {
                border-radius: 14px;
            }

            .quick-card {
                box-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.92),
                    0 14px 26px rgba(22, 48, 58, 0.12),
                    0 8px 16px rgba(28, 139, 116, 0.2);
            }

            .anchor-card {
                padding: 16px;
            }

            .card-link {
                padding: 16px;
            }

            .hero-panel {
                padding: 18px;
                border-radius: 0 0 16px 16px;
            }

            .day-card {
                padding: 18px;
                margin: 18px 0;
            }

            .timeline-table th:first-child,
            .timeline-table td:first-child {
                width: 120px;
            }

            .timeline-table th,
            .timeline-table td {
                padding: 9px 10px;
                font-size: 0.94rem;
            }

            .chip-row {
                gap: 7px;
            }

            .chip {
                width: 100%;
                justify-content: flex-start;
            }

            .icon-thumb {
                width: 34px;
                height: 34px;
                border-radius: 10px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <div class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></div>
            <div class="site-subtitle">{{ site.description }}</div>
            <nav class="crumb-nav" aria-label="Breadcrumb">
                <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}is-active{% endif %}">Trips</a>
                {% if page.url contains '/Trips/Yellowstone' %}
                <span class="crumb-sep">›</span>
                <a href="{{ '/Trips/Yellowstone/' | relative_url }}" class="{% if page.url == '/Trips/Yellowstone/' %}is-active{% endif %}">Yellowstone</a>
                {% endif %}
            </nav>
            {% if page.url contains '/Trips/Yellowstone' %}
            <nav class="section-nav" aria-label="Yellowstone sections">
                <a href="{{ '/Trips/Yellowstone/' | relative_url }}" class="{% if page.url == '/Trips/Yellowstone/' %}is-active{% endif %}">Overview</a>
                <a href="{{ '/Trips/Yellowstone/DailyActivity' | relative_url }}" class="{% if page.url contains '/Trips/Yellowstone/DailyActivity' %}is-active{% endif %}">Daily</a>
                <a href="{{ '/Trips/Yellowstone/Todo' | relative_url }}" class="{% if page.url contains '/Trips/Yellowstone/Todo' %}is-active{% endif %}">TODO</a>
            </nav>
            {% endif %}
        </header>
        <main>
            {{ content }}
        </main>
    </div>

    <script>
        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            checkbox.disabled = false;
            const item = checkbox.closest('li') || checkbox.parentElement;
            const text = (item && item.textContent ? item.textContent : checkbox.outerHTML).trim();
            const key = 'trip_checkbox_' + window.location.pathname + '_' + text.substring(0, 80);

            function syncClass() {
                if (item) {
                    item.classList.toggle('task-complete', checkbox.checked);
                }
            }

            const saved = localStorage.getItem(key);
            if (saved !== null) {
                try {
                    checkbox.checked = JSON.parse(saved);
                } catch (_error) {
                    checkbox.checked = false;
                }
            }
            syncClass();

            checkbox.addEventListener('change', () => {
                localStorage.setItem(key, JSON.stringify(checkbox.checked));
                syncClass();
            });
        });
    </script>
</body>
</html>
