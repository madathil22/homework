<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        h2 {
            color: #667eea;
            margin-top: 25px;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .trip-info {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 30px;
            font-weight: 500;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }
        
        hr {
            border: none;
            border-top: 2px solid #eee;
            margin: 30px 0;
        }
        
        ul {
            margin-left: 20px;
        }
        
        li {
            margin-bottom: 12px;
            color: #555;
        }
        
        strong {
            color: #2c3e50;
        }
        
        a {
            color: #667eea;
            text-decoration: none;
            border-bottom: 1px solid #667eea;
        }
        
        a:hover {
            color: #764ba2;
        }

        .back-link {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        input[type="checkbox"] {
            cursor: pointer;
            margin-right: 8px;
            accent-color: #667eea;
        }

        input[type="checkbox"]:checked + label {
            text-decoration: line-through;
            color: #aaa;
        }

        label {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        {{ content }}
    </div>

    <script>
        // Make checkboxes interactive and persist state
        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            const key = 'checkbox_' + checkbox.nextElementSibling.textContent.substring(0, 50);
            
            // Load saved state
            if (localStorage.getItem(key)) {
                checkbox.checked = JSON.parse(localStorage.getItem(key));
            }
            
            // Save state on change
            checkbox.addEventListener('change', function() {
                localStorage.setItem(key, JSON.stringify(this.checked));
            });
        });
    </script>
</body>
</html>
